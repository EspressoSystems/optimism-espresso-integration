# Espresso OP Integration Docker Setup

services:
  l1:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8545"]
      interval: 3s
      timeout: 2s
      retries: 40
    build:
      context: ../ops/docker/deployment-utils
    image: l1-geth:espresso
    volumes:
      - ../config/l1-genesis-devnet.json:/l1-genesis-devnet.json:ro
      - l1-data:/data
    command:
      - sh
      - -c
      # Initialize with the L1 genesis file.
      # Enable `dev` to automatically create blocks in the dev mode.
      # Set `dev.period=1` to create a block every 1 second.
      - |
        set -e
        rm -rf /data/geth || true
        geth --datadir /data init /l1-genesis-devnet.json
        exec geth --datadir /data \
          --http \
          --http.addr=0.0.0.0 \
          --http.api=eth,net,web3,admin \
          --http.port=8545 \
          --http.vhosts=* \
          --http.corsdomain=* \
          --nodiscover \
          --dev \
          --dev.period=12 \
          --miner.etherbase=0x3C44CdDdB6a900fa2b585dd299e03d12FA4293BC \
          --mine \
          --allow-insecure-unlock \
          --rpc.allow-unprotected-txs
    ports:
      - "8545:8545" # L1 RPC

  op-geth:
    # If the version below is updated, update the version for `images/op-geth` in the Docker
    # Compose section in README_ESPRESSO.md as well.
    image: us-docker.pkg.dev/oplabs-tools-artifacts/images/op-geth:v1.101503.2-rc.3
    depends_on:
      l1:
        condition: service_healthy
    volumes:
      - ../config:/config
      - op-geth-data:/data
    environment:
      L1_RPC: http://l1:8545
    entrypoint: ["/bin/sh", "-c"]
    command:
      # Initialize with the L2 genesis file.
      - |
        if [ ! -d "/data/geth" ]; then
          geth init --datadir=/data /config/l2-genesis-devnet.json
        fi
        exec geth \
          --datadir=/data \
          --networkid=1 \
          --http \
          --http.addr=0.0.0.0 \
          --http.port=8545 \
          --http.api=eth,net,web3,debug,admin,txpool \
          --http.vhosts=* \
          --http.corsdomain=* \
          --authrpc.addr=0.0.0.0 \
          --authrpc.port=8551 \
          --authrpc.vhosts=* \
          --authrpc.jwtsecret=/config/jwt.txt \
          --rollup.disabletxpoolgossip=true \
          --rollup.halt=major \
          --nodiscover
    ports:
      - "8546:8545"  # L2 RPC
      - "8551:8551"  # Engine API

  op-node-sequencer:
    build:
      context: ../
      dockerfile: ./ops/docker/op-stack-go/Dockerfile
      target: op-node-target
    image: op-node-sequencer:espresso
    depends_on:
      op-geth:
        condition: service_started
    environment:
      L1_RPC: http://l1:8545
    volumes:
      - ../config:/config
      - /etc/localtime:/etc/localtime:ro
    command:
      - op-node
      - --l1=http://l1:8545
      - --l2=http://op-geth:8551
      - --l2.jwt-secret=/config/jwt.txt
      - --rollup.config=/config/op-node/rollup-devnet.json
      - --sequencer.enabled=true
      - --rpc.addr=0.0.0.0
      - --rpc.port=9545 # Specify the port that the `op-batcher` service will use

  op-node-verifier:
    build:
      context: ../
      dockerfile: ./ops/docker/op-stack-go/Dockerfile
      target: op-node-target
    image: op-node-verifier:espresso
    depends_on:
      op-geth:
        condition: service_started
    environment:
      L1_RPC: http://l1:8545
    volumes:
      - ../config:/config
    command:
      - op-node
      - --l1=http://l1:8545
      - --l2=http://op-geth:8551
      - --l2.jwt-secret=/config/jwt.txt
      - --rollup.config=/config/op-node/rollup-devnet.json

  caff-node:
    build:
      context: ../
      dockerfile: ./ops/docker/op-stack-go/Dockerfile
      target: op-node-target
    image: caff-node:espresso
    depends_on:
      op-geth:
        condition: service_started
      espresso-dev-node:
        condition: service_started
    environment:
      L1_RPC: http://l1:8545
      CAFF_ESPRESSO_LIGHT_CLIENT_ADDR: "0x703848f4c85f18e3acd8196c8ec91eb0b7bd0797"
    volumes:
      - ../config:/config
    command:
      - op-node
      - --l1=http://l1:8545
      - --l2=http://op-geth:8551
      - --l2.jwt-secret=/config/jwt.txt
      - --rollup.config=/config/op-node/rollup-devnet.json
      - --caff.node=true
      - --sequencer.enabled=false
      - --verifier.l1-confs=0
      - --rollup.load-protocol-versions=false
      - --rollup.halt=none
      - --l1.trustrpc=true
      - --rpc.enable-admin=true
      - --caff.hotshot-urls=http://espresso-dev-node:24000
      - --caff.next-hotshot-block-num=1
      - --caff.polling-hotshot-polling-interval=500ms
      - --log.level=debug
    restart: "no"

  op-batcher:
    build:
      context: ../
      dockerfile: ./ops/docker/op-stack-go/Dockerfile
      target: op-batcher-target
    image: op-batcher:espresso
    # It is not necessary to specify all dependencies, but a good practice.
    depends_on:
      l1:
        condition: service_healthy
      op-geth:
        condition: service_started
      op-node-sequencer:
        condition: service_started
      espresso-dev-node:
        condition: service_started
    environment:
      L1_RPC: http://l1:8545
    volumes:
      - ../packages/contracts-bedrock/lib/superchain-registry/ops/testdata/monorepo:/config
    command:
      - op-batcher
      - --l1-eth-rpc=http://l1:8545                                                                               # Port from the `l1` service
      - --l2-eth-rpc=http://op-geth:8545                                                                          # Port from the `op-geth` service
      - --rollup-rpc=http://op-node-sequencer:9545                                                                # Port from the `op-node-sequencer` service
      - --espresso-url=http://espresso-dev-node:24000
      - --espresso-light-client-addr=0x703848f4c85f18e3acd8196c8ec91eb0b7bd0797
      - --testing-espresso-batcher-private-key=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80 # Default value for testing
      - --mnemonic=test test test test test test test test test test test junk                                    # Arbitrary value for testing
      - --hd-path=m/44'/60'/0'/0/0                                                                                # Arbitrary value for testing

  op-proposer:
    build:
      context: ../
      dockerfile: ./ops/docker/op-stack-go/Dockerfile
      target: op-proposer-target
    image: op-proposer:espresso
    depends_on:
      - op-node-sequencer
    volumes:
      - ../packages/contracts-bedrock/lib/superchain-registry/ops/testdata/monorepo:/config
    command:
      - op-proposer
      - --l1-eth-rpc=http://l1:8545                                             # Port from the `l1` service
      - --rollup-rpc=http://op-node-sequencer:9545                              # Port from the `op-node-sequencer` service
      # - --l2oo-address=0x086f77C5686dfe3F2f8FE487C5f8d357952C8556
      - --game-factory-address=0x80741a37E3644612F0465145C9709a90B6D77Ee3
      - --proposal-interval=6s
      - --mnemonic=test test test test test test test test test test test junk  # Arbitrary value for testing
      - --hd-path=m/44'/60'/0'/0/0                                              # Arbitrary value for testing

  op-deployer:
    build:
      context: ../
      dockerfile: ./op-deployer/Dockerfile.default
    image: op-deployer:espresso
    depends_on:
      - l1
    volumes:
      - ../packages/contracts-bedrock/lib/superchain-registry/ops/testdata/monorepo:/config
    restart: "no"

  espresso-dev-node:
    image: ghcr.io/espressosystems/espresso-sequencer/espresso-dev-node:release-colorful-snake
    depends_on:
      l1:
        condition: service_healthy
    ports:
      - "24000:24000" # Espresso sequencer
      - "24002:24002" # Espresso dev node
      - "31003:31003" # Espresso builder
    volumes:
      - espresso-data:/data
    environment:
      RUST_LOG: info
      ESPRESSO_SEQUENCER_STORAGE_PATH: /data/espresso
      ESPRESSO_SEQUENCER_L1_PROVIDER: http://l1:8545
      ESPRESSO_DEPLOYER_ACCOUNT_INDEX: 0
      ESPRESSO_SEQUENCER_ETH_MNEMONIC: "giant issue aisle success illegal bike spike question tent bar rely arctic volcano long crawl hungry vocal artwork sniff fantasy very lucky have athlete"
      ESPRESSO_SEQUENCER_API_PORT: 24000
      ESPRESSO_DEV_NODE_PORT: 24002
      ESPRESSO_BUILDER_PORT: 31003

volumes:
  l1-data:
  op-geth-data:
  espresso-data:
