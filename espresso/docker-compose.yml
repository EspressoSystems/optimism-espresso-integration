# Espresso OP Integration Docker Setup

services:
  l1-geth:
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${ESPRESSO_L1_PORT}"]
      interval: 3s
      timeout: 2s
      retries: 40
    build:
      context: ./docker/l1-geth
    image: l1-geth:espresso
    volumes:
      - l1-geth-data:/data
    environment:
      ESPRESSO_L1_PORT: ${ESPRESSO_L1_PORT}
    ports:
      - "${ESPRESSO_L1_PORT}:${ESPRESSO_L1_PORT}" # L1 RPC

  op-geth:
    build:
      context: ./docker/op-geth
    image: op-geth:espresso
    depends_on:
      l1-geth:
        condition: service_healthy
    volumes:
      - ./docker/op-geth:/config
      - op-geth-data:/data
    environment:
      L1_RPC: ${ESPRESSO_L1_PROVIDER}
      ESPRESSO_L1_PORT: ${ESPRESSO_L1_PORT}
      ESPRESSO_GETH_PORT: ${ESPRESSO_GETH_PORT}
    ports:
      - "8546:${ESPRESSO_L1_PORT}"  # L2 RPC
      - "${ESPRESSO_GETH_PORT}:${ESPRESSO_GETH_PORT}"  # Engine API

  op-node-sequencer:
    build:
      context: ../
      dockerfile: espresso/docker/op-stack/Dockerfile
      target: op-node-target
    image: op-node-sequencer:espresso
    depends_on:
      op-geth:
        condition: service_started
    environment:
      L1_RPC: ${ESPRESSO_L1_PROVIDER}
      OP_NODE_L1_ETH_RPC: ${ESPRESSO_L1_PROVIDER}
      OP_NODE_L2_ENGINE_RPC: ${ESPRESSO_GETH_PROVIDER}
      OP_NODE_RPC_PORT: ${ESPRESSO_ROLLUP_PORT}
    volumes:
      - ./docker/op-geth:/config
      - /etc/localtime:/etc/localtime:ro
    command:
      - op-node
      - --l2.jwt-secret=/config/jwt.txt
      - --rollup.config=/config/rollup-devnet.json
      - --sequencer.enabled=true
      - --rpc.addr=0.0.0.0

  op-node-verifier:
    build:
      context: ../
      dockerfile: espresso/docker/op-stack/Dockerfile
      target: op-node-target
    image: op-node-verifier:espresso
    depends_on:
      op-geth:
        condition: service_started
    environment:
      L1_RPC: ${ESPRESSO_L1_PROVIDER}
      OP_NODE_L1_ETH_RPC: ${ESPRESSO_L1_PROVIDER}
      OP_NODE_L2_ENGINE_RPC: ${ESPRESSO_GETH_PROVIDER}
    volumes:
      - ./docker/op-geth:/config
    command:
      - op-node
      - --l2.jwt-secret=/config/jwt.txt
      - --rollup.config=/config/rollup-devnet.json

  caff-node:
    build:
      context: ../
      dockerfile: espresso/docker/op-stack/Dockerfile
      target: op-node-target
    image: caff-node:espresso
    depends_on:
      op-geth:
        condition: service_started
      espresso-dev-node:
        condition: service_started
    environment:
      L1_RPC: ${ESPRESSO_L1_PROVIDER}
      OP_NODE_L1_ETH_RPC: ${ESPRESSO_L1_PROVIDER}
      OP_NODE_L2_ENGINE_RPC: ${ESPRESSO_GETH_PROVIDER}
      CAFF_ESPRESSO_LIGHT_CLIENT_ADDR: "0x703848f4c85f18e3acd8196c8ec91eb0b7bd0797"
      CAFF_HOTSHOT_URLS: ${ESPRESSO_URL}
    volumes:
      - ./docker/op-geth:/config
    command:
      - op-node
      - --l2.jwt-secret=/config/jwt.txt
      - --rollup.config=/config/rollup-devnet.json
      - --caff.node=true
      - --sequencer.enabled=false
      - --verifier.l1-confs=0
      - --rollup.load-protocol-versions=false
      - --rollup.halt=none
      - --l1.trustrpc=true
      - --rpc.enable-admin=true
      - --caff.next-hotshot-block-num=1
      - --caff.polling-hotshot-polling-interval=500ms
      - --log.level=debug
    restart: "no"

  op-batcher:
    build:
      context: ../
      dockerfile: espresso/docker/op-stack/Dockerfile
      target: op-batcher-target
    image: op-batcher:espresso
    # It is not necessary to specify all dependencies, but a good practice.
    depends_on:
      l1-geth:
        condition: service_healthy
      op-geth:
        condition: service_started
      op-node-sequencer:
        condition: service_started
      espresso-dev-node:
        condition: service_started
    environment:
      L1_RPC: ${ESPRESSO_L1_PROVIDER}
      OP_BATCHER_L1_ETH_RPC: ${ESPRESSO_L1_PROVIDER}
      OP_BATCHER_L2_ETH_RPC: ${ESPRESSO_GETH_PROVIDER}
      OP_BATCHER_ROLLUP_RPC: ${ESPRESSO_ROLLUP_PROVIDER}
      ESPRESSO_URL: ${ESPRESSO_URL}
    volumes:
      - ../packages/contracts-bedrock/lib/superchain-registry/ops/testdata/monorepo:/config
    command:
      - op-batcher
      - --espresso-light-client-addr=0x703848f4c85f18e3acd8196c8ec91eb0b7bd0797
      - --testing-espresso-batcher-private-key=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80 # Default value for testing
      - --mnemonic=test test test test test test test test test test test junk                                    # Arbitrary value for testing
      - --hd-path=m/44'/60'/0'/0/0                                                                                # Arbitrary value for testing

  op-proposer:
    build:
      context: ../
      dockerfile: espresso/docker/op-stack/Dockerfile
      target: op-proposer-target
    image: op-proposer:espresso
    depends_on:
      op-node-sequencer:
        condition: service_started
    environment:
      OP_PROPOSER_L1_ETH_RPC: ${ESPRESSO_L1_PROVIDER}
      OP_PROPOSER_ROLLUP_RPC: ${ESPRESSO_ROLLUP_PROVIDER}
    volumes:
      - ../packages/contracts-bedrock/lib/superchain-registry/ops/testdata/monorepo:/config
    command:
      - op-proposer
      # TODO: Fix the address below by deploying the contract and move it to `environment`
      # afterward.
      # <https://app.asana.com/1/1208976916964769/project/1209392461754458/task/1210662897601844?focus=true>
      # We need to specify either
      #   `l2oo-address` or
      #   `game-factory-address` and `proposal-interval`.
      - --game-factory-address=0x80741a37E3644612F0465145C9709a90B6D77Ee3
      - --proposal-interval=6s
      - --mnemonic=test test test test test test test test test test test junk  # Arbitrary value for testing
      - --hd-path=m/44'/60'/0'/0/0                                              # Arbitrary value for testing

  op-deployer:
    build:
      context: ../
      dockerfile: ./op-deployer/Dockerfile.default
    image: op-deployer:espresso
    depends_on:
      - l1-geth
    volumes:
      - ../packages/contracts-bedrock/lib/superchain-registry/ops/testdata/monorepo:/config
    restart: "no"

  espresso-dev-node:
    image: ghcr.io/espressosystems/espresso-sequencer/espresso-dev-node:release-colorful-snake
    depends_on:
      l1-geth:
        condition: service_healthy
    ports:
      - "${ESPRESSO_SEQUENCER_API_PORT}:${ESPRESSO_SEQUENCER_API_PORT}"
      - "${ESPRESSO_DEV_NODE_PORT}:${ESPRESSO_DEV_NODE_PORT}"
      - "${ESPRESSO_BUILDER_PORT}:${ESPRESSO_BUILDER_PORT}"
    volumes:
      - espresso-data:/data
    environment:
      RUST_LOG: info
      ESPRESSO_SEQUENCER_STORAGE_PATH: /data/espresso
      ESPRESSO_SEQUENCER_L1_PROVIDER: ${ESPRESSO_L1_PROVIDER}
      ESPRESSO_DEPLOYER_ACCOUNT_INDEX: 0
      ESPRESSO_SEQUENCER_ETH_MNEMONIC: "giant issue aisle success illegal bike spike question tent bar rely arctic volcano long crawl hungry vocal artwork sniff fantasy very lucky have athlete"
      # TODO: After fixing all services, determine whether it is unnecessary to specify the
      # following ports.
      # <https://app.asana.com/1/1208976916964769/project/1209392461754458/task/1210662897601844?focus=true>
      ESPRESSO_SEQUENCER_API_PORT: ${ESPRESSO_SEQUENCER_API_PORT}
      ESPRESSO_DEV_NODE_PORT: ${ESPRESSO_DEV_NODE_PORT}
      ESPRESSO_BUILDER_PORT: ${ESPRESSO_BUILDER_PORT}

volumes:
  l1-geth-data:
  op-geth-data:
  espresso-data:
