name: Compile Contracts

on:
  workflow_call:

jobs:
  run:
    runs-on: ubuntu-24.04-8core
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache submodules
        uses: ./.github/actions/cache-submodules

      - name: Restore forge-artifacts cache
        id: forge-cache
        uses: actions/cache@v4
        with:
          path: packages/contracts-bedrock/forge-artifacts
          key: forge-artifacts-dev-${{ hashFiles('packages/contracts-bedrock/foundry.toml', 'packages/contracts-bedrock/src/**/*.sol', 'packages/contracts-bedrock/scripts/**/*.sol', 'packages/contracts-bedrock/interfaces/**/*.sol', 'packages/contracts-bedrock/test/**/*.sol', '.gitmodules', 'flake.lock') }}

      - name: Install Nix
        if: steps.forge-cache.outputs.cache-hit != 'true'
        uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true

      - name: Restore Nix cache
        if: steps.forge-cache.outputs.cache-hit != 'true'
        id: cache-nix-restore
        uses: nix-community/cache-nix-action/restore@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}

      - name: Set up Nix environment
        if: steps.forge-cache.outputs.cache-hit != 'true'
        uses: nicknovitski/nix-develop@v1

      - name: Compile contracts (build-dev)
        if: steps.forge-cache.outputs.cache-hit != 'true'
        run: just compile-contracts

      - name: Normalize script artifact names for getDeployedCode/getCode
        run: |
          ensure_artifact() {
            local dir="$1" base="$2"
            if [ -d "$dir" ] && [ ! -f "$dir/$base.json" ]; then
              for f in "$dir"/$base.*.json; do
                [ -f "$f" ] && cp "$f" "$dir/$base.json" && echo "Copied $(basename "$f") -> $base.json in $dir" && break
              done
            fi
          }
          ensure_artifact "packages/contracts-bedrock/forge-artifacts/scripts/deploy/Deploy.s.sol" "Deploy"
          ensure_artifact "packages/contracts-bedrock/forge-artifacts/ProxyAdmin.sol" "ProxyAdmin"

      - name: Fix Proxy/ProxyAdmin/OPCM impl bytecode (vm.getCode; empty bytecode causes "no code at" / addGameType failed)
        working-directory: packages/contracts-bedrock
        run: |
          fix_artifact() {
            local dir="$1" base="$2"
            [ ! -f "$dir/${base}.0.8.15.json" ] && return 0
            if [ ! -f "$dir/${base}.json" ]; then
              cp "$dir/${base}.0.8.15.json" "$dir/${base}.json"
              echo "Created ${base}.json from ${base}.0.8.15.json"
              return 0
            fi
            python3 << PY
          import json
          main = json.load(open("$dir/${base}.json"))
          versioned = json.load(open("$dir/${base}.0.8.15.json"))
          bc = main.get("bytecode", {}).get("object", "0x")
          if len(bc) <= 2:
            main["bytecode"] = versioned["bytecode"]
            main["deployedBytecode"] = versioned["deployedBytecode"]
            json.dump(main, open("$dir/${base}.json", "w"), indent=2)
            print("Fixed ${base}.json bytecode")
          else:
            print("${base}.json already has bytecode")
          PY
          }
          fix_artifact "forge-artifacts/Proxy.sol" "Proxy"
          fix_artifact "forge-artifacts/ProxyAdmin.sol" "ProxyAdmin"
          opcm_dir="forge-artifacts/OPContractsManager.sol"
          for base in OPContractsManager OPContractsManagerContractsContainer OPContractsManagerGameTypeAdder OPContractsManagerDeployer OPContractsManagerUpgrader OPContractsManagerInteropMigrator; do
            fix_artifact "$opcm_dir" "$base"
          done
          fix_artifact "forge-artifacts/OPContractsManagerV2.sol" "OPContractsManagerV2"
          rm -f forge-artifacts/OPContractsManagerV2.sol/OPContractsManagerV2.0.8.15.json
          for f in forge-artifacts/*/*.0.8.15.json; do
            [ -f "$f" ] || continue
            base="${f%.0.8.15.json}"
            if [ -f "${base}.json" ]; then rm -f "$f"; fi
          done

      - name: Save Nix cache
        if: always() && steps.forge-cache.outputs.cache-hit != 'true' && steps.cache-nix-restore.outputs.hit-primary-key != 'true'
        uses: nix-community/cache-nix-action/save@v6
        with:
          primary-key: ${{ steps.cache-nix-restore.outputs.primary-key }}

      - name: Upload forge-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forge-artifacts
          path: packages/contracts-bedrock/forge-artifacts/
          retention-days: 1
