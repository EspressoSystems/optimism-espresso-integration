name: "[cLabs] Publish Docker Image For Release"
on:
  workflow_dispatch:
  release:
    types: [published]  # Trigger the workflow only when a release is published

jobs:
  Set-Tags:
    runs-on: ubuntu-latest
    steps:
      - name: Set tags
        id: set_tags
        run: |
          if [[ "${{ github.event.release.tag_name }}" == *"rc"* || "${{ github.event.release.tag_name }}" == *"beta"* || "${{ github.event.release.tag_name }}" == *"alpha"* ]]; then
            echo "::set-output name=tags::${{ github.event.release.tag_name }}"
          else
            echo "::set-output name=tags::${{ github.event.release.tag_name }},stable,latest"
          fi
    outputs:
      tags: ${{ steps.set_tags.outputs.tags }}

  # Build op-node and op-batcher using docker-bake and push to devopsre/celo-blockchain-public registry
  build-op-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    needs: Set-Tags
    permissions:
      contents: read
      id-token: write
      security-events: write
    env:
      GIT_COMMIT: ${{ github.sha }}
      GIT_DATE: ${{ github.event.release.created_at }}
      IMAGE_TAGS: ${{ needs.Set-Tags.outputs.tags }}
      REGISTRY: us-west1-docker.pkg.dev
      REPOSITORY: devopsre/celo-blockchain-public
      PLATFORMS: linux/amd64,linux/arm64
    steps:
      - uses: actions/checkout@v4
      - name: Login at GCP Artifact Registry
        uses: celo-org/reusable-workflows/.github/actions/auth-gcp-artifact-registry@v2.0
        with:
          workload-id-provider: 'projects/1094498259535/locations/global/workloadIdentityPools/gh-optimism/providers/github-by-repos'
          service-account: 'celo-optimism-gh@devopsre.iam.gserviceaccount.com'
          docker-gcp-registries: us-west1-docker.pkg.dev
      # We need a custom steps as it's using docker bake
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push
        uses: docker/bake-action@v5
        with:
          push: true
          source: .
          files: docker-bake.hcl
          targets: op-node,op-batcher

  # Attest images
  attest-op-stack:
    runs-on: ubuntu-latest
    needs: [Set-Tags, build-op-stack]
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      IMAGE_TAGS: ${{ needs.Set-Tags.outputs.tags }}
      REGISTRY: us-west1-docker.pkg.dev
      REPOSITORY: devopsre/celo-blockchain-public
    steps:
      - uses: 'google-github-actions/auth@v2'
        id: auth1
        with:
          workload_identity_provider: projects/1094498259535/locations/global/workloadIdentityPools/gh-optimism/providers/github-by-repos
          service_account: celo-optimism-gh@devopsre.iam.gserviceaccount.com
          token_format: access_token
      - name: Auth w/ registry
        uses: docker/login-action@v3
        with:
          registry: us-west1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth1.outputs.access_token }}
      - name: Set up crane
        uses: imjasonh/setup-crane@v0.4
      - name: Resolve op-node image digest
        id: op_node_digest
        run: |
          image_tag="${IMAGE_TAGS%%,*}"
          digest="$(crane digest "${REGISTRY}/${REPOSITORY}/op-node:${image_tag}")"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
      - name: Attest op-node image
        uses: actions/attest@v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/op-node
          subject-digest: ${{ steps.op_node_digest.outputs.digest }}
          push-to-registry: true
      - name: Resolve op-batcher image digest
        id: op_batcher_digest
        run: |
          image_tag="${IMAGE_TAGS%%,*}"
          digest="$(crane digest "${REGISTRY}/${REPOSITORY}/op-batcher:${image_tag}")"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
      - name: Attest op-batcher image
        uses: actions/attest@v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.REPOSITORY }}/op-batcher
          subject-digest: ${{ steps.op_batcher_digest.outputs.digest }}
          push-to-registry: true
