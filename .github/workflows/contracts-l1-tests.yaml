name: L1 Contracts Tests

on:
  pull_request:
  push:
    branches:
      - "celo-integration*"
      - "main"
      - "develop"
  workflow_dispatch:

jobs:
  contracts-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly-654c8f01721e43dbc8a53c7a3b022548cb82b2f9

      - name: Install Just
        uses: extractions/setup-just@v2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install dependencies
        working-directory: packages/contracts-bedrock
        run: just install

      - name: Build go-ffi
        working-directory: packages/contracts-bedrock
        run: just build-go-ffi

      # Build src + scripts (lite, skip tests).
      - name: Build src and scripts (lite, skip tests)
        working-directory: packages/contracts-bedrock
        env:
          FOUNDRY_PROFILE: lite
        run: forge build --skip "/**/test/**" -j 1
        timeout-minutes: 25

      # Fix Proxy/ProxyAdmin/OPCM impl artifact bytecode and remove duplicate .0.8.15.json so vm.getCode finds a single artifact.
      - name: Fix artifact bytecode and deduplicate
        working-directory: packages/contracts-bedrock
        run: |
          fix_artifact() {
            local dir="$1" base="$2"
            [ ! -f "$dir/${base}.0.8.15.json" ] && return 0
            if [ ! -f "$dir/${base}.json" ]; then
              cp "$dir/${base}.0.8.15.json" "$dir/${base}.json"
              echo "Created ${base}.json"
              return 0
            fi
            python3 << PY
          import json
          main = json.load(open("$dir/${base}.json"))
          versioned = json.load(open("$dir/${base}.0.8.15.json"))
          bc = main.get("bytecode", {}).get("object", "0x")
          if len(bc) <= 2:
            main["bytecode"] = versioned["bytecode"]
            main["deployedBytecode"] = versioned["deployedBytecode"]
            json.dump(main, open("$dir/${base}.json", "w"), indent=2)
            print("Fixed ${base}.json")
          PY
          }
          fix_artifact "forge-artifacts/Proxy.sol" "Proxy"
          fix_artifact "forge-artifacts/ProxyAdmin.sol" "ProxyAdmin"
          opcm_dir="forge-artifacts/OPContractsManager.sol"
          for base in OPContractsManager OPContractsManagerContractsContainer OPContractsManagerGameTypeAdder OPContractsManagerDeployer OPContractsManagerUpgrader OPContractsManagerInteropMigrator; do
            fix_artifact "$opcm_dir" "$base"
          done
          fix_artifact "forge-artifacts/OPContractsManagerV2.sol" "OPContractsManagerV2"
          rm -f forge-artifacts/OPContractsManagerV2.sol/OPContractsManagerV2.0.8.15.json
          python3 scripts/fix_artifact_bytecode.py
          for f in forge-artifacts/*/*.0.8.15.json; do
            [ -f "$f" ] || continue
            base="${f%.0.8.15.json}"
            if [ -f "${base}.json" ]; then rm -f "$f"; fi
          done

      - name: Run L1 contracts tests
        timeout-minutes: 45
        working-directory: packages/contracts-bedrock
        env:
          FOUNDRY_PROFILE: lite
        run: forge test --match-path "test/L1/*.t.sol" -vv

