name: L1 Contracts Tests

on:
  pull_request:
  push:
    branches:
      - "celo-integration*"
      - "main"
      - "develop"
  workflow_dispatch:

jobs:
  contracts-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly-654c8f01721e43dbc8a53c7a3b022548cb82b2f9

      - name: Install Just
        uses: extractions/setup-just@v2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install dependencies
        working-directory: packages/contracts-bedrock
        run: just install

      - name: Build go-ffi
        working-directory: packages/contracts-bedrock
        run: just build-go-ffi

      # Full build (src + scripts + tests) with -j 1 to reduce peak memory and avoid OOM (exit 143).
      # Then we normalize artifact names and run tests with --no-build so forge test does not recompile
      # and overwrite the Deploy.json / ProxyAdmin.json that getDeployedCode expects.
      - name: Build all (src, scripts, tests)
        working-directory: packages/contracts-bedrock
        run: forge build -j 1
        timeout-minutes: 35

      - name: Normalize script artifact names for getDeployedCode
        working-directory: packages/contracts-bedrock
        run: |
          # getDeployedCode looks for Deploy.json / ProxyAdmin.json; Foundry may write versioned names (e.g. Deploy.0.8.15.json)
          ensure_artifact() {
            local dir="$1" base="$2"
            if [ -d "$dir" ] && [ ! -f "$dir/$base.json" ]; then
              for f in "$dir"/$base.*.json; do
                [ -f "$f" ] && cp "$f" "$dir/$base.json" && echo "Copied $(basename "$f") -> $base.json in $dir" && break
              done
            fi
            [ -d "$dir" ] && ls -la "$dir" || true
          }
          ensure_artifact "forge-artifacts/scripts/deploy/Deploy.s.sol" "Deploy"
          ensure_artifact "forge-artifacts/ProxyAdmin.sol" "ProxyAdmin"

      - name: Run L1 contracts tests
        timeout-minutes: 20
        working-directory: packages/contracts-bedrock
        run: forge test --match-path "test/L1/*.t.sol" --no-build -vv

