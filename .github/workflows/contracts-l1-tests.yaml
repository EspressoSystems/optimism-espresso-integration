name: L1 Contracts Tests

on:
  pull_request:
  push:
    branches:
      - "celo-integration*"
      - "main"
      - "develop"
  workflow_dispatch:

jobs:
  contracts-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly-654c8f01721e43dbc8a53c7a3b022548cb82b2f9

      - name: Install Just
        uses: extractions/setup-just@v2

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install dependencies
        working-directory: packages/contracts-bedrock
        run: just install

      - name: Build go-ffi
        working-directory: packages/contracts-bedrock
        run: just build-go-ffi

      # Build src + scripts (skip tests) to stay under memory limit.
      - name: Build src and scripts (lite, skip tests)
        working-directory: packages/contracts-bedrock
        env:
          FOUNDRY_PROFILE: lite
        run: forge build --skip "/**/test/**" -j 1
        timeout-minutes: 25

      - name: Normalize script artifact names for getDeployedCode
        working-directory: packages/contracts-bedrock
        run: |
          ensure_artifact() {
            local dir="$1" base="$2"
            if [ -d "$dir" ] && [ ! -f "$dir/$base.json" ]; then
              for f in "$dir"/$base.*.json; do
                [ -f "$f" ] && cp "$f" "$dir/$base.json" && echo "Copied $(basename "$f") -> $base.json in $dir" && break
              done
            fi
            [ -d "$dir" ] && ls -la "$dir" || true
          }
          ensure_artifact "forge-artifacts/scripts/deploy/Deploy.s.sol" "Deploy"
          ensure_artifact "forge-artifacts/ProxyAdmin.sol" "ProxyAdmin"

      # Compile test contracts (may overwrite script artifacts with versioned names).
      - name: Compile tests (lite)
        working-directory: packages/contracts-bedrock
        env:
          FOUNDRY_PROFILE: lite
        run: forge test --match-path "test/L1/*.t.sol" -j 1 -vv || true
        timeout-minutes: 20

      - name: Normalize script artifact names again
        working-directory: packages/contracts-bedrock
        run: |
          ensure_artifact() {
            local dir="$1" base="$2"
            if [ -d "$dir" ] && [ ! -f "$dir/$base.json" ]; then
              for f in "$dir"/$base.*.json; do
                [ -f "$f" ] && cp "$f" "$dir/$base.json" && echo "Copied $(basename "$f") -> $base.json in $dir" && break
              done
            fi
            [ -d "$dir" ] && ls -la "$dir" || true
          }
          ensure_artifact "forge-artifacts/scripts/deploy/Deploy.s.sol" "Deploy"
          ensure_artifact "forge-artifacts/ProxyAdmin.sol" "ProxyAdmin"

      - name: Run L1 contracts tests
        timeout-minutes: 20
        working-directory: packages/contracts-bedrock
        env:
          FOUNDRY_PROFILE: lite
        run: forge test --match-path "test/L1/*.t.sol" --no-build -vv

