name: Run Espresso integration tests
on:
  pull_request:
  push:
    branches:
      - "celo-integration*"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-24.04-8core
    strategy:
      fail-fast: false
      matrix:
        group: [0, 1, 2, 3]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true
      - name: Restore Nix cache
        id: cache-nix-restore
        uses: nix-community/cache-nix-action/restore@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
      - name: Set up Nix environment
        uses: nicknovitski/nix-develop@v1

      - name: Set up Go
        id: go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Ensure go module checksums
        run: go mod download github.com/consensys/bavard && go list -m all >/dev/null

      - name: Compile contracts
        run: just compile-contracts

      - name: Fix Proxy artifact bytecode
        run: cd packages/contracts-bedrock && just fix-proxy-artifact

      - name: Load environment variables
        run: |
          while IFS= read -r line; do
            # Skip comments and empty lines
            if [[ ! "$line" =~ ^#.* ]] && [[ -n "$line" ]]; then
              # Remove quotes from values
              line=$(echo "$line" | sed 's/"\(.*\)"/\1/')
              echo "$line" >> $GITHUB_ENV
            fi
          done < ./espresso/.env
        shell: bash

      - name: Generate test slice
        id: test_split
        env:
          PATH: ${{ env.GOROOT }}/bin:${{ env.PATH }}
        run: |
          TOTAL=4
          INDEX=${{ matrix.group }}
          RUN=$(go test ./espresso/... -list . 2>&1 | grep -E '^Test' | awk -v total=$TOTAL -v idx=$INDEX '(NR-1)%total==idx {print}' | paste -sd'|' -)
          echo "run=${RUN}" >> $GITHUB_OUTPUT
      - name: Run Go tests for group ${{ matrix.group }}
        env:
          PATH: ${{ env.GOROOT }}/bin:${{ env.PATH }}
        run: |
          go test -short -timeout 30m -p 1 -count 1 -v -run "^(${{ steps.test_split.outputs.run}})$" ./espresso/...

      - name: Save Nix cache
        uses: nix-community/cache-nix-action/save@v6
        if: always() && steps.cache-nix-restore.outputs.hit-primary-key != 'true'
        with:
          primary-key: ${{ steps.cache-nix-restore.outputs.primary-key }}
