name: Build and Push Docker Images

on:
  push:
    branches:
      - "celo-integration*"
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-contracts:
    uses: ./.github/workflows/build-contracts.yml
    with:
      build-type: optimized
      prepare-deployment: true
      artifact-name: contracts-optimized

  prepare-deployment:
    needs: build-contracts
    runs-on: ubuntu-latest
    outputs:
      deployment-hash: ${{ steps.hash.outputs.hash }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download contract and deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: contracts-optimized

      - name: Generate deployment hash
        id: hash
        run: echo "hash=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-artifacts
          path: |
            op-deployer/bin/
            espresso/deployment/
            packages/contracts-bedrock/
          retention-days: 7

  build-l1-geth:
    needs: prepare-deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifacts

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/l1-geth
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=pr-${{ github.event.number }},enable=${{ github.event_name == 'pull_request' }}

      - name: Build and push L1 Geth
        uses: docker/build-push-action@v5
        with:
          context: .
          file: espresso/docker/l1-geth/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-op-geth:
    needs: prepare-deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifacts

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/op-geth
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=pr-${{ github.event.number }},enable=${{ github.event_name == 'pull_request' }}

      - name: Build and push OP Geth
        uses: docker/build-push-action@v5
        with:
          context: .
          file: espresso/docker/op-geth/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-op-node:
    needs: prepare-deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifacts

      - name: Create l2-config directory
        run: |
          mkdir -p espresso/deployment/l2-config
          echo "Created l2-config directory"
          ls -la espresso/deployment/

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/op-node
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=pr-${{ github.event.number }},enable=${{ github.event_name == 'pull_request' }}

      - name: Build and push OP Node
        uses: docker/build-push-action@v5
        with:
          context: .
          file: espresso/docker/op-stack/Dockerfile
          target: op-node-target
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TARGET_BASE_IMAGE=alpine:3.22
            TARGETOS=linux
            TARGETARCH=amd64

  build-op-batcher:
    needs: prepare-deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifacts

      - name: Copy config for op-batcher
        run: |
          mkdir -p packages/contracts-bedrock/lib/superchain-registry/ops/testdata/monorepo
          # Copy any required config files here, or create placeholder
          echo "Config prepared for op-batcher"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/op-batcher
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=pr-${{ github.event.number }},enable=${{ github.event_name == 'pull_request' }}

      - name: Build and push OP Batcher
        uses: docker/build-push-action@v5
        with:
          context: .
          file: espresso/docker/op-stack/Dockerfile
          target: op-batcher-target
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TARGET_BASE_IMAGE=alpine:3.22
            TARGETOS=linux
            TARGETARCH=amd64

  build-op-proposer:
    needs: prepare-deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifacts

      - name: Verify deployment files are present
        run: |
          echo "=== Verifying downloaded files ==="
          ls -la espresso/deployment/ || echo "No deployment directory"
          ls -la espresso/deployment/deployer/ || echo "No deployer directory"
          ls -la packages/contracts-bedrock/ || echo "No contracts-bedrock directory"

      - name: Copy config for op-proposer
        run: |
          mkdir -p packages/contracts-bedrock/lib/superchain-registry/ops/testdata/monorepo
          echo "Config prepared for op-proposer"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/op-proposer
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=pr-${{ github.event.number }},enable=${{ github.event_name == 'pull_request' }}

      - name: Build and push OP Proposer
        uses: docker/build-push-action@v5
        with:
          context: .
          file: espresso/docker/op-stack/Dockerfile
          target: op-proposer-target
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TARGET_BASE_IMAGE=alpine:3.22
            TARGETOS=linux
            TARGETARCH=amd64

  build-op-batcher-tee:
    needs: prepare-deployment
    runs-on: ubuntu-24.04-8core
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifacts

      - name: Copy config for op-batcher
        run: |
          mkdir -p packages/contracts-bedrock/lib/superchain-registry/ops/testdata/monorepo
          # Copy any required config files here, or create placeholder
          echo "Config prepared for op-batcher"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/op-batcher-tee
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=pr-${{ github.event.number }},enable=${{ github.event_name == 'pull_request' }}

      - name: Build and push OP Batcher TEE
        uses: docker/build-push-action@v5
        with:
          context: .
          file: espresso/docker/op-stack/Dockerfile
          target: op-batcher-enclave-target
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TARGET_BASE_IMAGE=alpine:3.22
            TARGETOS=linux
            TARGETARCH=amd64

  build-op-proposer-tee:
    needs: prepare-deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
