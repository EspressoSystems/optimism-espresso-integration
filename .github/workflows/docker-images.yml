name: Build and Push Docker Images

on:
  push:
    branches:
      - "celo-integration*"
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/espressosystems/optimism-espresso-integration

jobs:
  prepare-deployment:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      deployment-hash: ${{ steps.hash.outputs.hash }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly-654c8f01721e43dbc8a53c7a3b022548cb82b2f9 # same as for the nix environment

      - name: Install dasel
        run: |
          curl -sSL "https://github.com/TomWright/dasel/releases/download/v2.8.1/dasel_linux_amd64" -o /tmp/dasel
          sudo mv /tmp/dasel /usr/local/bin/dasel
          sudo chmod +x /usr/local/bin/dasel
          dasel --version

      - name: Build op-deployer
        run: |
          cd op-deployer
          just
          echo "$(pwd)/bin" >> $GITHUB_PATH

      - name: Compile contracts
        env:
          FOUNDRY_DISABLE_NIGHTLY_WARNING: 1
        run: cd packages/contracts-bedrock && just build-no-tests
        timeout-minutes: 25

      - name: Fix Proxy artifact bytecode
        run: cd packages/contracts-bedrock && just fix-proxy-artifact

      - name: Prepare allocations
        run: |
          cd espresso
          ./scripts/prepare-allocs.sh

      - name: List generated files
        run: |
          echo "=== Generated deployment files ==="
          find espresso/deployment -type f -name "*.json" -o -name "*.toml" | head -20
          echo "=== L1 Config ==="
          ls -la espresso/deployment/l1-config/ || echo "No l1-config directory"
          echo "=== Deployer ==="
          ls -la espresso/deployment/deployer/ || echo "No deployer directory"

      - name: Generate deployment hash
        id: hash
        run: echo "hash=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-artifacts
          path: |
            op-deployer/bin/
            espresso/deployment/
            packages/contracts-bedrock/
          retention-days: 1

  build-l1-geth-amd64:
    needs: prepare-deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifacts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push L1 Geth (amd64)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: espresso/docker/l1-geth/Dockerfile
          platforms: linux/amd64
          outputs: type=image,name=${{ env.IMAGE_PREFIX }}/l1-geth,push-by-digest=true,name-canonical=true,push=true

  build-l1-geth-arm64:
    needs: prepare-deployment
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifacts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push L1 Geth (arm64)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: espresso/docker/l1-geth/Dockerfile
          platforms: linux/arm64
          outputs: type=image,name=${{ env.IMAGE_PREFIX }}/l1-geth,push-by-digest=true,name-canonical=true,push=true

  merge-l1-geth:
    needs: [build-l1-geth-amd64, build-l1-geth-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/l1-geth
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=pr-${{ github.event.number }},enable=${{ github.event_name == 'pull_request' }}

      - name: Create manifest and push
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            ${{ env.IMAGE_PREFIX }}/l1-geth@${{ needs.build-l1-geth-amd64.outputs.digest }} \
            ${{ env.IMAGE_PREFIX }}/l1-geth@${{ needs.build-l1-geth-arm64.outputs.digest }}

  build-op-geth-amd64:
    needs: prepare-deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifacts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OP Geth (amd64)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: espresso/docker/op-geth/Dockerfile
          platforms: linux/amd64
          outputs: type=image,name=${{ env.IMAGE_PREFIX }}/op-geth,push-by-digest=true,name-canonical=true,push=true

  build-op-geth-arm64:
    needs: prepare-deployment
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifacts

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OP Geth (arm64)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: espresso/docker/op-geth/Dockerfile
          platforms: linux/arm64
          outputs: type=image,name=${{ env.IMAGE_PREFIX }}/op-geth,push-by-digest=true,name-canonical=true,push=true

  merge-op-geth:
    needs: [build-op-geth-amd64, build-op-geth-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/op-geth
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=pr-${{ github.event.number }},enable=${{ github.event_name == 'pull_request' }}

      - name: Create manifest and push
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            ${{ env.IMAGE_PREFIX }}/op-geth@${{ needs.build-op-geth-amd64.outputs.digest }} \
            ${{ env.IMAGE_PREFIX }}/op-geth@${{ needs.build-op-geth-arm64.outputs.digest }}

  build-op-node-amd64:
    needs: prepare-deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifacts

      - name: Create l2-config directory
        run: mkdir -p espresso/deployment/l2-config

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OP Node (amd64)
        id: build
        uses: docker/build-push-action@v5
        with:
