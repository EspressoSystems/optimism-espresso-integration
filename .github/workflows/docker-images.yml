name: Build and Push Docker Images

on:
  push:
    branches:
      - "celo-integration*"
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  prepare-deployment:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      deployment-hash: ${{ steps.hash.outputs.hash }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly-654c8f01721e43dbc8a53c7a3b022548cb82b2f9 # same as for the nix environment

      - name: Install dasel
        run: |
          curl -sSL "https://github.com/TomWright/dasel/releases/download/v2.8.1/dasel_linux_amd64" -o /tmp/dasel
          sudo mv /tmp/dasel /usr/local/bin/dasel
          sudo chmod +x /usr/local/bin/dasel
          dasel --version

      - name: Build op-deployer
        run: |
          cd op-deployer
          just
          echo "$(pwd)/bin" >> $GITHUB_PATH

      - name: Compile contracts
        env:
          FOUNDRY_DISABLE_NIGHTLY_WARNING: 1
        run: cd packages/contracts-bedrock && just build-no-tests
        timeout-minutes: 25

      - name: Fix Proxy artifact bytecode
        run: cd packages/contracts-bedrock && just fix-proxy-artifact

      - name: Prepare allocations
        run: |
          cd espresso
          ./scripts/prepare-allocs.sh

      - name: List generated files
        run: |
          echo "=== Generated deployment files ==="
          find espresso/deployment -type f -name "*.json" -o -name "*.toml" | head -20
          echo "=== L1 Config ==="
          ls -la espresso/deployment/l1-config/ || echo "No l1-config directory"
          echo "=== Deployer ==="
          ls -la espresso/deployment/deployer/ || echo "No deployer directory"

      - name: Generate deployment hash
        id: hash
        run: echo "hash=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-artifacts
          path: |
            op-deployer/bin/
            espresso/deployment/
            packages/contracts-bedrock/
          retention-days: 1

  build-l1-geth:
    needs: prepare-deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifacts

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/l1-geth
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=pr-${{ github.event.number }},enable=${{ github.event_name == 'pull_request' }}

      - name: Build and push L1 Geth
        uses: docker/build-push-action@v5
        with:
          context: .
          file: espresso/docker/l1-geth/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-op-geth:
    needs: prepare-deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifacts

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/op-geth
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=pr-${{ github.event.number }},enable=${{ github.event_name == 'pull_request' }}

      - name: Build and push OP Geth
        uses: docker/build-push-action@v5
        with:
          context: .
          file: espresso/docker/op-geth/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build-op-node:
    needs: prepare-deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifacts

      - name: Create l2-config directory
        run: |
          mkdir -p espresso/deployment/l2-config
          echo "Created l2-config directory"
          ls -la espresso/deployment/

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/op-node
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=pr-${{ github.event.number }},enable=${{ github.event_name == 'pull_request' }}

      - name: Build and push OP Node
        uses: docker/build-push-action@v5
        with:
          context: .
          file: espresso/docker/op-stack/Dockerfile
          target: op-node-target
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TARGET_BASE_IMAGE=alpine:3.22
            TARGETOS=linux
            TARGETARCH=amd64

  build-op-batcher:
    needs: prepare-deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: deployment-artifacts

      - name: Copy config for op-batcher
        run: |
          mkdir -p packages/contracts-bedrock/lib/superchain-registry/ops/testdata/monorepo
          # Copy any required config files here, or create placeholder
          echo "Config prepared for op-batcher"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/op-batcher
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=pr-${{ github.event.number }},enable=${{ github.event_name == 'pull_request' }}

      - name: Build and push OP Batcher
        uses: docker/build-push-action@v5
        with:
          context: .
          file: espresso/docker/op-stack/Dockerfile
          target: op-batcher-target
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TARGET_BASE_IMAGE=alpine:3.22
            TARGETOS=linux
            TARGETARCH=amd64

  build-op-proposer:
    needs: prepare-deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
