name: Run enclave tests on EC2 instance

on:
  pull_request:
  push:
    branches:
      - "celo-integration*"
  workflow_dispatch:
    inputs:
      create_ami:
        description: 'Create the AMI used for enclave tests'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  enclave-tests-on-ec2:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        name: configure aws credentials
        with:
          role-to-assume: arn:aws:iam::324783324287:role/github-optimism-espresso-integration-access
          role-duration-seconds: 10800
          aws-region: us-east-2

      - name: Set branch name
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "BRANCH_NAME=${{ github.head_ref }}" >> $GITHUB_ENV
          else
            echo "BRANCH_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
          fi

      - name: Generate SSH key pair
        run: |
          ssh-keygen -t rsa -b 4096 -f temp_ssh_key -N ""
          echo "Generated SSH key:"
          cp temp_ssh_key.pub github-ec2-key.pub
          cp temp_ssh_key key.pem
          chmod 600 key.pem

      - name: Delete old key pair with the same name if needed
        id: check_key
        run: |
          if aws ec2 describe-key-pairs --key-names github-key >/dev/null 2>&1; then
            aws ec2 delete-key-pair --key-name github-key
          fi

      - name: Import SSH public key
        run: |
          aws ec2 import-key-pair --key-name github-key --public-key-material fileb://github-ec2-key.pub

      - name: Get security group ID
        id: sg
        run: |
          SG_ID=$(aws ec2 describe-security-groups --filters Name=group-name,Values=default --query 'SecurityGroups[0].GroupId' --output text)
          echo "id=$SG_ID" >> $GITHUB_OUTPUT

      - name: Allow tcp in security group
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ steps.sg.outputs.id }} \
            --protocol tcp \
            --port 22 \
            --cidr 0.0.0.0/0 || true

      - name: Determine AMI ID
        id: ami_setup
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.create_ami }}" == "true" ]]; then
            # Use Amazon Linux 2023 as base image for AMI creation
            BASE_AMI_ID=$(aws ec2 describe-images \
              --owners amazon \
              --filters "Name=name,Values=al2023-ami-*-x86_64" "Name=state,Values=available" \
              --query 'Images | sort_by(@, &CreationDate) | [-1].ImageId' \
              --output text)
            echo "ami_id=$BASE_AMI_ID" >> $GITHUB_OUTPUT
            echo "create_ami=true" >> $GITHUB_OUTPUT
            echo "Using base AMI for AMI creation: $BASE_AMI_ID"
          else
            # Verify the pre-built AMI exists
            if ! aws ec2 describe-images --image-ids ami-0ff5662328e9bbc2f >/dev/null 2>&1; then
              echo "ERROR: Pre-built AMI ami-0ff5662328e9bbc2f does not exist!"
              echo "Please run this workflow with 'Create the AMI' option enabled first."
              exit 1
            fi
            echo "ami_id=ami-0ff5662328e9bbc2f" >> $GITHUB_OUTPUT
            echo "create_ami=false" >> $GITHUB_OUTPUT
            echo "Using existing test AMI: ami-0ff5662328e9bbc2f"
          fi

      - name: Launch EC2 Instance
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 run-instances \
          --image-id "${{ steps.ami_setup.outputs.ami_id }}" \
          --count 1 \
          --instance-type m6a.2xlarge \
          --key-name github-key \
          --security-group-ids ${{ steps.sg.outputs.id }} \
          --block-device-mappings '[{"DeviceName":"/dev/xvda","Ebs":{"VolumeSize":100,"VolumeType":"gp3","DeleteOnTermination":true}}]' \
          --enclave-options 'Enabled=true' \
          --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=GitHubRunner}]' \
          --output text \
          --query 'Instances[0].InstanceId')

          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV

      - name: Wait for instance to be running
        run: |
          aws ec2 wait instance-status-ok --instance-ids $INSTANCE_ID

      - name: Get EC2 Public DNS
        id: dns
        run: |
          DNS=$(aws ec2 describe-instances --instance-ids $INSTANCE_ID \
            --query 'Reservations[0].Instances[0].PublicDnsName' --output text)
          echo "DNS=$DNS" >> $GITHUB_ENV
          echo "dns=$DNS" >> $GITHUB_OUTPUT

      - name: Prepare AMI (if creating)
        if: ${{ steps.ami_setup.outputs.create_ami == 'true' }}
        timeout-minutes: 45
        run: |
          scp -o StrictHostKeyChecking=no -i key.pem espresso/scripts/enclave-prepare-ami.sh ec2-user@$DNS:/home/ec2-user/
          ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@$DNS "chmod +x enclave-prepare-ami.sh"
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=5 -i key.pem ec2-user@$DNS << 'EOF'
            ./enclave-prepare-ami.sh
          EOF

      - name: Stop instance and create AMI
        if: ${{ steps.ami_setup.outputs.create_ami == 'true' }}
        id: new_ami
        run: |
          aws ec2 stop-instances --instance-ids $INSTANCE_ID
          aws ec2 wait instance-stopped --instance-ids $INSTANCE_ID

          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          NEW_AMI_ID=$(aws ec2 create-image \
            --instance-id $INSTANCE_ID \
            --name "enclave-test-ami-$TIMESTAMP" \
            --description "AMI for running enclave tests with Nix, Docker, and Nitro Enclaves CLI" \
            --output text)

          echo "ami_id=$NEW_AMI_ID" >> $GITHUB_OUTPUT
          echo "Created AMI: $NEW_AMI_ID"

          aws ec2 wait image-available --image-ids $NEW_AMI_ID
          echo "AMI $NEW_AMI_ID is now available"

          echo "### AMI Created Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "New AMI ID: \`$NEW_AMI_ID\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Update the AMI ID in .github/workflows/espresso-enclave.yaml line 100:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`yaml" >> $GITHUB_STEP_SUMMARY
          echo "echo \"ami_id=$NEW_AMI_ID\" >> \$GITHUB_OUTPUT" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Terminate first instance
        if: ${{ steps.ami_setup.outputs.create_ami == 'true' }}
        run: |
          aws ec2 terminate-instances --instance-ids $INSTANCE_ID
          aws ec2 wait instance-terminated --instance-ids $INSTANCE_ID

      - name: Launch test instance from new AMI
        if: ${{ steps.ami_setup.outputs.create_ami == 'true' }}
        id: test_ec2
        run: |
          TEST_INSTANCE_ID=$(aws ec2 run-instances \
          --image-id "${{ steps.new_ami.outputs.ami_id }}" \
          --count 1 \
          --instance-type m6a.2xlarge \
          --key-name github-key \
          --security-group-ids ${{ steps.sg.outputs.id }} \
          --block-device-mappings '[{"DeviceName":"/dev/xvda","Ebs":{"VolumeSize":100,"VolumeType":"gp3","DeleteOnTermination":true}}]' \
          --enclave-options 'Enabled=true' \
          --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=GitHubRunner-Test}]' \
          --output text \
          --query 'Instances[0].InstanceId')

          echo "TEST_INSTANCE_ID=$TEST_INSTANCE_ID" >> $GITHUB_ENV
          echo "test_instance_id=$TEST_INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Wait for test instance to be running
        if: ${{ steps.ami_setup.outputs.create_ami == 'true' }}
        run: |
          aws ec2 wait instance-status-ok --instance-ids $TEST_INSTANCE_ID

      - name: Get test instance DNS
        if: ${{ steps.ami_setup.outputs.create_ami == 'true' }}
        run: |
          TEST_DNS=$(aws ec2 describe-instances --instance-ids $TEST_INSTANCE_ID \
            --query 'Reservations[0].Instances[0].PublicDnsName' --output text)
          echo "DNS=$TEST_DNS" >> $GITHUB_ENV

      - name: Upload run-tests.sh to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i key.pem espresso/scripts/run-tests-github-actions.sh ec2-user@$DNS:/home/ec2-user/
          ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@$DNS "chmod +x run-tests-github-actions.sh"

      - name: Run test script on EC2
        timeout-minutes: 40
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=5 -i key.pem ec2-user@$DNS << EOF
            export BRANCH_NAME=$BRANCH_NAME
            ./run-tests-github-actions.sh  ${{ secrets.CACHIX_AUTH_TOKEN }}
          EOF

      - name: Terminate EC2 instance
        if: ${{ always() }}
        run: |
          # Terminate test instance if it exists
          if [ ! -z "$TEST_INSTANCE_ID" ]; then
            aws ec2 terminate-instances --instance-ids $TEST_INSTANCE_ID
            aws ec2 wait instance-terminated --instance-ids $TEST_INSTANCE_ID
          fi
          # Terminate original instance if it still exists (shouldn't happen but safety check)
          if [ ! -z "$INSTANCE_ID" ]; then
            aws ec2 terminate-instances --instance-ids $INSTANCE_ID 2>/dev/null || true
          fi
