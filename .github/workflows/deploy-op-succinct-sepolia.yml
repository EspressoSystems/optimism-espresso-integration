name: Deploy Op-Succinct Contracts to Sepolia

on:
  workflow_dispatch:
    inputs:
      state_json_artifact:
        description: 'Artifact name containing state.json (from op-deployer deployment)'
        required: false
        default: 'deployment-artifacts'
      force_redeploy:
        description: 'Force redeployment even if contracts already exist'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  push:
    paths:
      - '.github/workflows/deploy-op-succinct-sepolia.yml'
      - 'espresso/scripts/deploy-op-succinct-sepolia.sh'

env:
  SEPOLIA_CHAIN_ID: 11155111

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly-654c8f01721e43dbc8a53c7a3b022548cb82b2f9

      - name: Install dasel
        run: |
          curl -sSL "https://github.com/TomWright/dasel/releases/download/v2.8.1/dasel_linux_amd64" -o /tmp/dasel
          sudo mv /tmp/dasel /usr/local/bin/dasel
          sudo chmod +x /usr/local/bin/dasel

      - name: Build op-deployer
        run: |
          cd op-deployer
          just
          echo "$(pwd)/bin" >> $GITHUB_PATH

      - name: Compile contracts
        run: cd packages/contracts-bedrock && just build

      - name: Download state.json from artifact (optional)
        id: download_state
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.state_json_artifact || 'deployment-artifacts' }}
          path: deployer/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id || github.run_id || '' }}

      - name: Extract state.json from deployment artifacts
        if: steps.download_state.outcome == 'success'
        continue-on-error: true
        run: |
          # Check if state.json is in a subdirectory (from docker-images.yml structure)
          if [ -f "deployer/espresso/deployment/deployer/state.json" ]; then
            mkdir -p deployer
            cp deployer/espresso/deployment/deployer/state.json deployer/state.json
            echo "✓ Found state.json in deployment artifacts subdirectory"
          fi

      - name: Check for existing state.json
        id: check_state
        run: |
          if [ -f "deployer/state.json" ]; then
            echo "state_found=true" >> $GITHUB_OUTPUT
            echo "✓ Found existing state.json"
            echo "DisputeGameFactory: $(jq -r '.opChainDeployments[0].DisputeGameFactoryProxy' deployer/state.json)"
            echo "AnchorStateRegistry: $(jq -r '.opChainDeployments[0].AnchorStateRegistryProxy' deployer/state.json)"
          else
            echo "state_found=false" >> $GITHUB_OUTPUT
            echo "⚠ state.json not found - will deploy OP Stack contracts to Sepolia first"
          fi

      - name: Deploy OP Stack contracts to Sepolia
        if: steps.check_state.outputs.state_found != 'true'
        env:
          L1_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          OPERATOR_PRIVATE_KEY: ${{ secrets.SEPOLIA_OPERATOR_PRIVATE_KEY }}
          L1_CHAIN_ID: ${{ env.SEPOLIA_CHAIN_ID }}
          L2_CHAIN_ID: ${{ secrets.SEPOLIA_L2_CHAIN_ID || '11155420' }}
          OPERATOR_ADDRESS: ${{ secrets.SEPOLIA_OPERATOR_ADDRESS }}
          PROPOSER_ADDRESS: ${{ secrets.SEPOLIA_PROPOSER_ADDRESS }}
          BATCH_AUTHENTICATOR_OWNER_ADDRESS: ${{ secrets.SEPOLIA_BATCH_AUTHENTICATOR_OWNER_ADDRESS || secrets.SEPOLIA_OPERATOR_ADDRESS }}
        run: |
          echo "Deploying OP Stack contracts to Sepolia..."

          # Check prerequisites
          if [ -z "${L1_RPC_URL}" ]; then
            echo "ERROR: SEPOLIA_RPC_URL secret not set"
            exit 1
          fi

          if [ -z "${OPERATOR_PRIVATE_KEY}" ]; then
            echo "ERROR: SEPOLIA_OPERATOR_PRIVATE_KEY secret not set"
            exit 1
          fi

          if [ -z "${OPERATOR_ADDRESS}" ]; then
            echo "ERROR: SEPOLIA_OPERATOR_ADDRESS secret not set"
            exit 1
          fi

          # Set up deployment directory
          mkdir -p deployer
          OP_ROOT=$(pwd)
          DEPLOYER_DIR="${OP_ROOT}/deployer"
          ARTIFACTS_DIR="file:///${OP_ROOT}/packages/contracts-bedrock/forge-artifacts"

          # Bootstrap and deploy OP Stack contracts
          echo "Bootstrap proxy..."
          op-deployer bootstrap proxy \
            --l1-rpc-url="${L1_RPC_URL}" \
            --private-key="${OPERATOR_PRIVATE_KEY}" \
            --artifacts-locator="${ARTIFACTS_DIR}" \
            --proxy-owner="${OPERATOR_ADDRESS}"

          echo "Bootstrap superchain..."
          op-deployer bootstrap superchain \
            --l1-rpc-url="${L1_RPC_URL}" \
            --private-key="${OPERATOR_PRIVATE_KEY}" \
            --artifacts-locator="${ARTIFACTS_DIR}" \
            --outfile="${DEPLOYER_DIR}/bootstrap_superchain.json" \
            --superchain-proxy-admin-owner="${OPERATOR_ADDRESS}" \
            --protocol-versions-owner="${OPERATOR_ADDRESS}" \
            --guardian="${OPERATOR_ADDRESS}"

          echo "Bootstrap implementations..."
          op-deployer bootstrap implementations \
            --l1-rpc-url="${L1_RPC_URL}" \
            --private-key="${OPERATOR_PRIVATE_KEY}" \
            --artifacts-locator="${ARTIFACTS_DIR}" \
            --protocol-versions-proxy=$(jq -r .protocolVersionsProxyAddress < ${DEPLOYER_DIR}/bootstrap_superchain.json) \
            --superchain-config-proxy=$(jq -r .superchainConfigProxyAddress < ${DEPLOYER_DIR}/bootstrap_superchain.json) \
            --superchain-proxy-admin=$(jq -r .proxyAdminAddress < ${DEPLOYER_DIR}/bootstrap_superchain.json) \
            --upgrade-controller="${OPERATOR_ADDRESS}" \
            --challenger="${OPERATOR_ADDRESS}" \
            --proof-maturity-delay-seconds=604800 \
            --dispute-game-finality-delay-seconds=604800 \
            --outfile="${DEPLOYER_DIR}/bootstrap_implementations.json"

          echo "Initialize deployment..."
          op-deployer init --l1-chain-id "${L1_CHAIN_ID}" \
            --l2-chain-ids "${L2_CHAIN_ID}" \
            --intent-type standard-overrides \
            --outdir "${DEPLOYER_DIR}"

          # Configure Espresso (if needed)
          dasel put -f "${DEPLOYER_DIR}/intent.toml" -s .chains.[0].espressoEnabled -t bool -v true || true

          echo "Apply deployment..."
          BATCH_AUTHENTICATOR_OWNER_ADDRESS="${BATCH_AUTHENTICATOR_OWNER_ADDRESS}" op-deployer apply \
            --l1-rpc-url "${L1_RPC_URL}" \
            --workdir "${DEPLOYER_DIR}" \
            --private-key="${OPERATOR_PRIVATE_KEY}"

          echo "✓ OP Stack deployment complete!"
          echo "state.json location: ${DEPLOYER_DIR}/state.json"

      - name: Deploy op-succinct contracts
        env:
          L1_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          OPERATOR_PRIVATE_KEY: ${{ secrets.SEPOLIA_OPERATOR_PRIVATE_KEY }}
          L1_CHAIN_ID: ${{ env.SEPOLIA_CHAIN_ID }}
          FORCE_DEPLOY: ${{ inputs.force_redeploy == 'true' && '1' || '' }}
          CONTRACTS_DIR: ${{ github.workspace }}/packages/contracts-bedrock
        run: |
          echo "Deploying op-succinct contracts to Sepolia..."

          # Check prerequisites
          if [ -z "${L1_RPC_URL}" ]; then
            echo "ERROR: SEPOLIA_RPC_URL secret not set"
            exit 1
          fi

          if [ -z "${OPERATOR_PRIVATE_KEY}" ]; then
            echo "ERROR: SEPOLIA_OPERATOR_PRIVATE_KEY secret not set"
            exit 1
          fi

          # Check if state.json exists
          if [ ! -f "deployer/state.json" ]; then
            echo "ERROR: state.json not found in deployer/"
            echo ""
            echo "IMPORTANT: state.json MUST be from a Sepolia deployment (not Anvil)."
            echo "The addresses in state.json must exist on Sepolia chain."
            echo ""
            echo "Options:"
            echo "1. Provide state.json from a Sepolia op-deployer deployment via artifact"
            echo "2. Set DISPUTE_GAME_FACTORY and ANCHOR_STATE_REGISTRY environment variables"
            echo "   (these must be Sepolia contract addresses)"
            exit 1
          fi

          # Warn if state.json might be from wrong chain (can't fully validate, but warn)
          echo "Note: Ensure state.json contains Sepolia contract addresses, not Anvil addresses."

          # Run deployment script
          ./espresso/scripts/deploy-op-succinct-sepolia.sh deployer/state.json

      - name: Verify deployment output
        id: verify
        run: |
          if [ -f "deployer/succinct-contracts.json" ]; then
            echo "deployed=true" >> $GITHUB_OUTPUT
            echo "✓ Deployment successful!"
            echo ""
            echo "Deployed contracts:"
            jq -r '.contracts | to_entries[] | "  \(.key): \(.value)"' deployer/succinct-contracts.json
            echo ""
            echo "Full deployment info:"
            cat deployer/succinct-contracts.json
          else
            echo "deployed=false" >> $GITHUB_OUTPUT
            echo "⚠ Deployment output not found"
          fi

      - name: Upload deployment artifacts
        if: steps.verify.outputs.deployed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: op-succinct-sepolia-contracts
          path: deployer/succinct-contracts.json
          retention-days: 90
          if-no-files-found: error

      - name: Upload as release artifact (optional)
        if: steps.verify.outputs.deployed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: op-succinct-sepolia-contracts-${{ github.run_number }}
          path: deployer/succinct-contracts.json
          retention-days: 365

      - name: Summary
        if: always()
        run: |
          echo "## Op-Succinct Contracts Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.verify.outputs.deployed }}" == "true" ]; then
            echo "✅ **Deployment Successful**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Deployed contracts:" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat deployer/succinct-contracts.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Download the artifact:** \`op-succinct-sepolia-contracts\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Deployment Failed**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the logs for details. Common issues:" >> $GITHUB_STEP_SUMMARY
            echo "- Missing \`state.json\` (provide via artifact)" >> $GITHUB_STEP_SUMMARY
            echo "- Missing secrets: \`SEPOLIA_RPC_URL\`, \`SEPOLIA_OPERATOR_PRIVATE_KEY\`" >> $GITHUB_STEP_SUMMARY
          fi

