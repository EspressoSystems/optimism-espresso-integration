name: Run Espresso Devnet tests
on:
  pull_request:
  push:
    branches:
      - "celo-integration*"
  workflow_dispatch:

jobs:
  build-contracts:
    uses: ./.github/workflows/compile-contracts.yaml

  prepare:
    needs: build-contracts
    runs-on: ubuntu-24.04-8core
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache submodules
        uses: ./.github/actions/cache-submodules

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true
      - name: Restore Nix cache
        id: cache-nix-restore
        uses: nix-community/cache-nix-action/restore@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
      - name: Set up Nix environment
        uses: nicknovitski/nix-develop@v1

      - name: Cache Go modules
        uses: actions/setup-go@v5

      - name: Download forge-artifacts
        uses: actions/download-artifact@v4
        with:
          name: forge-artifacts
          path: packages/contracts-bedrock/forge-artifacts/

      - name: Load environment variables
        run: |
          while IFS= read -r line; do
            # Skip comments and empty lines
            if [[ ! "$line" =~ ^#.* ]] && [[ -n "$line" ]]; then
              # Remove quotes from values
              line=$(echo "$line" | sed 's/"\(.*\)"/\1/')
              echo "$line" >> $GITHUB_ENV
            fi
          done < ./espresso/.env
        shell: bash

      - name: Build op-deployer and prepare allocs
        run: |
          cd op-deployer
          just
          export PATH=$PATH:$PWD/bin
          cd ../espresso
          ./scripts/prepare-allocs.sh

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: devnet-deployment
          path: espresso/deployment/
          retention-days: 1

      - name: Save Nix cache
        uses: nix-community/cache-nix-action/save@v6
        if: always() && steps.cache-nix-restore.outputs.hit-primary-key != 'true'
        with:
          primary-key: ${{ steps.cache-nix-restore.outputs.primary-key }}

  devnet-test:
    needs: prepare
    runs-on: ubuntu-24.04-8core
    strategy:
      fail-fast: false
      matrix:
        group: [0, 1, 2, 3, 4]
        include:
          - group: 0
            tests: "TestChallengeGame|TestChangeBatchInboxOwner"
            tee: false
          - group: 1
            tests: "TestSmokeWithoutTEE|TestBatcherRestart"
            tee: false
          - group: 2
            tests: "TestWithdrawal|TestBatcherSwitching"
            tee: false
          - group: 3
            tests: "TestSmokeWithTEE|TestForcedTransaction"
            tee: true
          - group: 4
            tests: "TestBatcherActivePublishOnly"
            tee: false
    env:
      ESPRESSO_DEVNET_TESTS_LIVENESS_PERIOD: "1m"
      ESPRESSO_DEVNET_TESTS_OUTAGE_PERIOD: "1m"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache submodules
        uses: ./.github/actions/cache-submodules

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true
      - name: Restore Nix cache
        id: cache-nix-restore
        uses: nix-community/cache-nix-action/restore@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
      - name: Set up Nix environment
        uses: nicknovitski/nix-develop@v1

      - name: Cache Go modules
        uses: actions/setup-go@v5

      - name: Download forge-artifacts
        uses: actions/download-artifact@v4
        with:
          name: forge-artifacts
          path: packages/contracts-bedrock/forge-artifacts/

      - name: Download deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: devnet-deployment
          path: espresso/deployment/

      - name: Build Docker images
        run: |
          cd espresso
          docker compose build
          COMPOSE_PROFILES=default docker compose pull --ignore-buildable

      - name: Build Docker images with TEE
        if: matrix.tee
        run: |
          cd espresso
          COMPOSE_PROFILES=tee docker compose build
          COMPOSE_PROFILES=tee docker compose pull --ignore-buildable

      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest

      - name: Run tests for group ${{ matrix.group }}
        run: gotestsum --format github-actions -- -timeout 30m -p 1 -count 1 -run '${{ matrix.tests }}' ./espresso/devnet-tests/...

      - name: Save Nix cache
        uses: nix-community/cache-nix-action/save@v6
        if: always() && steps.cache-nix-restore.outputs.hit-primary-key != 'true'
        with:
          primary-key: ${{ steps.cache-nix-restore.outputs.primary-key }}
