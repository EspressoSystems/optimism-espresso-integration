name: Run Espresso Devnet tests
on:
  pull_request:
  push:
    branches:
      - "celo-integration*"
  workflow_dispatch:

jobs:
  devnet-test:
    runs-on: ubuntu-24.04-8core
    strategy:
      fail-fast: false
      matrix:
        group: [0, 1, 2, 3, 4]
        include:
          - group: 0
            tests: "TestChallengeGame|TestChangeBatchInboxOwner"
            tee: false
          - group: 1
            tests: "TestSmokeWithoutTEE|TestBatcherRestart"
            tee: false
          - group: 2
            tests: "TestWithdrawal|TestBatcherSwitching"
            tee: false
          - group: 3
            tests: "TestSmokeWithTEE|TestForcedTransaction"
            tee: true
          - group: 4
            tests: "TestBatcherActivePublishOnly"
            tee: false
    env:
      ESPRESSO_DEVNET_TESTS_LIVENESS_PERIOD: "1m"
      ESPRESSO_DEVNET_TESTS_OUTAGE_PERIOD: "1m"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true
      - name: Restore Nix cache
        id: cache-nix-restore
        uses: nix-community/cache-nix-action/restore@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
      - name: Set up Nix environment
        uses: nicknovitski/nix-develop@v1

      - name: Cache Go modules
        uses: actions/setup-go@v5

      - name: Clean contract artifacts
        working-directory: packages/contracts-bedrock
        run: just clean

      - name: Compile contracts
        working-directory: packages/contracts-bedrock
        run: just build

      - name: Verify Proxy artifact exists and has bytecode
        working-directory: packages/contracts-bedrock
        run: |
          if [ ! -f "forge-artifacts/Proxy.sol/Proxy.json" ]; then
            echo "ERROR: Proxy artifact not found!"
            exit 1
          fi
          echo "Proxy artifact found successfully"
          ls -lh forge-artifacts/Proxy.sol/Proxy.json
          echo "Checking artifact structure..."
          echo "Top-level keys:"
          jq 'keys' forge-artifacts/Proxy.sol/Proxy.json
          echo "Bytecode object value:"
          jq -r '.bytecode.object' forge-artifacts/Proxy.sol/Proxy.json | head -c 100
          echo ""
          BYTECODE_LEN=$(jq -r '.bytecode.object' forge-artifacts/Proxy.sol/Proxy.json | wc -c)
          echo "Bytecode length: $BYTECODE_LEN characters"
          if [ "$BYTECODE_LEN" -lt 100 ]; then
            echo "ERROR: Bytecode is too short! This will cause deployment to fail."
            echo "Checking if bytecode field exists but is empty..."
            jq '.bytecode' forge-artifacts/Proxy.sol/Proxy.json
            exit 1
          fi

      - name: Load environment variables
        run: |
          while IFS= read -r line; do
            # Skip comments and empty lines
            if [[ ! "$line" =~ ^#.* ]] && [[ -n "$line" ]]; then
              # Remove quotes from values
              line=$(echo "$line" | sed 's/"\(.*\)"/\1/')
              echo "$line" >> $GITHUB_ENV
            fi
          done < ./espresso/.env
        shell: bash

      - name: Build Devnet without TEE
        run: |
          cd op-deployer
          just
          export PATH=$PATH:$PWD/bin
          cd ../espresso
          ./scripts/prepare-allocs.sh
          docker compose build
          docker compose pull l1-validator espresso-dev-node l1-data-init

      - name: Build Devnet with TEE
        if: matrix.tee
        run: |
          cd espresso
          COMPOSE_PROFILES=tee docker compose build

      - name: Run tests for group ${{ matrix.group }}
        run: go test -timeout 30m -p 1 -count 1 -run '${{ matrix.tests }}' -v ./espresso/devnet-tests/...

      - name: Save Nix cache
        uses: nix-community/cache-nix-action/save@v6
        if: always() && steps.cache-nix-restore.outputs.hit-primary-key != 'true'
        with:
          primary-key: ${{ steps.cache-nix-restore.outputs.primary-key }}
