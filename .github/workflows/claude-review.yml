name: Claude PR Review

on:
  pull_request:
    types: [opened, ready_for_review, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Remove project instructions
        run: rm -f CLAUDE.md AGENTS.md

      - name: Fetch team review comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN}}
        run: |
          mkdir -p ./tmp
          scripts/fetch-pr-team-comments \
            "${{ github.repository_owner }}" \
            "${{ github.event.repository.name }}" \
            "${{ github.event.pull_request.number }}" \
            > ./tmp/pr-review-comments.json

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Perform a comprehensive code review with the following focus areas:

            1. **Code Quality**
               - Clean code principles and best practices
               - Proper error handling and edge cases
               - Code readability and maintainability

            2. **Security**
               - Check for potential security vulnerabilities
               - Validate input sanitization
               - Review authentication/authorization logic

            3. **Performance**
               - Identify potential performance bottlenecks
               - Review database queries for efficiency
               - Check for memory leaks or resource issues

            4. **Testing**
               - Verify adequate test coverage
               - Review test quality and edge cases
               - Check for missing test scenarios

            5. **Documentation**
               - Ensure code is properly documented
               - Verify README updates for new features
               - Check API documentation accuracy

            Before reviewing, read existing comments from `./tmp/pr-review-comments.json`.
            - Do not duplicate feedback already given by any reviewer.
            - For your own unresolved review threads: respond to any changes or replies, then resolve if the issue is fixed, explained, or answered satisfactorily.
              `gh api graphql -f query='mutation { resolveReviewThread(input: {threadId: "<thread_id>"}) { thread { isResolved } } }'`
            - Only resolve your own threads, never others'.

            Do NOT comment on:
            - `todo!()` or `// TODO` -- these are intentional, just factor them into your understanding
            - Unnecessary clones or clone optimization suggestions
            - Unused code, fields, or parameters -- clippy catches these, and `_` prefixed names are intentionally unused

            Provide detailed feedback using inline comments for specific issues.
            Use top-level comments for general observations or praise.
          # Allowed tools (minimal permissions):
          #   mcp__github_inline_comment__create_inline_comment - post inline code comments
          #   gh pr comment  - post top-level PR comments
          #   gh pr diff     - read PR diff
          #   gh pr view     - read PR metadata
          #   gh api */pulls/*/comments  - reply to review thread comments
          #   gh api graphql mutation resolveReviewThread - resolve own review threads
          claude_args: |
            --model claude-opus-4-6 --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api */pulls/*/comments*),Bash(gh api graphql -f query='mutation { resolveReviewThread*)"
