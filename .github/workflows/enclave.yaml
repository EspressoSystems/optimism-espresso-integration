name: Launch & SSH EC2

on:
  pull_request:
    branches:
      - "celo-integration*"
  push:
    branches:
      - "master"
      - "celo-integration*"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  launch-and-ssh:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Check if key pair exists
        id: check_key
        run: |
          if aws ec2 describe-key-pairs --key-names github-key >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Import SSH public key
        if: steps.check_key.outputs.exists == 'false'
        run: |
          echo "${{ secrets.EC2_SSH_PUBLIC_KEY }}" > github-ec2-key.pub
          aws ec2 import-key-pair --key-name github-key --public-key-material fileb://github-ec2-key.pub

      - name: Get security group ID
        id: sg
        run: |
          SG_ID=$(aws ec2 describe-security-groups --filters Name=group-name,Values=default --query 'SecurityGroups[0].GroupId' --output text)
          echo "id=$SG_ID" >> $GITHUB_OUTPUT

      - name: Allow tcp in SG
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ steps.sg.outputs.id }} \
            --protocol tcp \
            --port 22 \
            --cidr 0.0.0.0/0 || true

      - name: Launch EC2 Instance
        id: ec2
        run: |
          # Amazon Linux 2023 AMI ID for us-east-1
          AMI_ID=ami-0f3f13f145e66a0a3
          INSTANCE_ID=$(aws ec2 run-instances \
          --image-id "$AMI_ID" \
          --count 1 \
          --instance-type m6a.2xlarge \
          --key-name github-key \
          --security-group-ids ${{ secrets.AWS_SECURITY_GROUP_ID }} \
          --block-device-mappings '[{"DeviceName":"/dev/xvda","Ebs":{"VolumeSize":100,"VolumeType":"gp3","DeleteOnTermination":true}}]' \
          --enclave-options 'Enabled=true' \
          --tag-specifications 'ResourceType=instance,Tags=[{Key=Name,Value=GitHubRunner}]' \
          --output text \
          --query 'Instances[0].InstanceId')

          echo "INSTANCE_ID=$INSTANCE_ID" >> $GITHUB_ENV

      - name: Wait for instance to be running
        run: aws ec2 wait instance-running --instance-ids $INSTANCE_ID

      - name: Get EC2 Public DNS
        id: dns
        run: |
          DNS=$(aws ec2 describe-instances --instance-ids $INSTANCE_ID \
            --query 'Reservations[0].Instances[0].PublicDnsName' --output text)
          echo "DNS=$DNS" >> $GITHUB_ENV
          echo "::set-output name=dns::$DNS"

      - name: Save private key
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Install dependencies
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@$DNS << 'EOF'
            sh <(curl --proto '=https' --tlsv1.2 -L https://nixos.org/nix/install) --daemon
            source ~/.bashrc
            sudo yum update
            sudo yum install git -y
            sudo yum install docker -y
            sudo amazon-linux-extras install aws-nitro-enclaves-cli -y
            git clone https://github.com/EspressoSystems/optimism-espresso-integration.git
            cd optimism-espresso-integration
            git submodule update --init --recursive
            nix --extra-experimental-features "nix-command flakes" develop
          EOF

      - name: Start enclave service
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@$DNS << 'EOF'
            sudo nitro-cli --version || sudo yum install aws-nitro-enclaves-cli -y
            sudo systemctl stop nitro-enclaves-allocator.service
            sudo mkdir -p /etc/nitro_enclaves
            echo -e 'memory_mib: 4096\ncpu_count: 2' | sudo tee /etc/nitro_enclaves/allocator.yaml
            sudo systemctl start nitro-enclaves-allocator.service
          EOF

      - name: Start docker service
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@$DNS << 'EOF'
            sudo usermod -a -G docker ec2-user
            sudo service docker start
            sudo chown ec2-user /var/run/docker.sock
          EOF

      - name: Run tests
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ec2-user@$DNS << 'EOF'
            cd /home/ec2-user/optimism-espresso-integration
            nix --extra-experimental-features "nix-command flakes" develop
            just espresso-enclave-tests
          EOF

