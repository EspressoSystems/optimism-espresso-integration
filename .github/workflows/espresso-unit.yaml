name: Run Espresso unit tests
on:
  pull_request:
  push:
    branches:
      - "celo-integration*"
  workflow_dispatch:

jobs:
  unit-tests:
    name: Espresso unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go and cache modules
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Download Go modules
        run: go mod download

      - name: Run Espresso unit tests
        run: |
          go test -timeout 5m -count 1 -v \
            -run "TestVerify|TestChainSignerFactory|TestUnmarshalEspressoTransaction|TestEspressoBatchConversion" \
            ./op-service/crypto/... \
            ./op-node/rollup/derive/...
