optimism_package:
  chains:
    - participants:
      - el_type: op-geth
        el_image: ""
        el_log_level: ""
        el_extra_env_vars: {}
        el_extra_labels: {}
        el_extra_params: []
        el_tolerations: []
        el_volume_size: 0
        el_min_cpu: 0
        el_max_cpu: 0
        el_min_mem: 0
        el_max_mem: 0
        cl_type: op-node
        cl_image: {{ localDockerImage "op-node" }}
        cl_log_level: ""
        cl_extra_env_vars: {}
        cl_extra_labels: {}
        cl_extra_params:
          - "--sequencer.use-finalized=true"
        cl_tolerations: []
        cl_volume_size: 0
        cl_min_cpu: 0
        cl_max_cpu: 0
        cl_min_mem: 0
        cl_max_mem: 0
        node_selectors: {}
        tolerations: []
        count: 1
      network_params:
        network: "celo"
        network_id: "2151908" # not "42220"  # Celo mainnet network ID
        seconds_per_slot: 5   # Celo's 5-second block time
        name: "op-celo"
        fjord_time_offset: 0
        granite_time_offset: 0
        holocene_time_offset: 0
        fund_dev_accounts: true
      batcher_params:
        image: {{ localDockerImage "op-batcher" }}
        extra_params: []
      challenger_params:
        image: {{ localDockerImage "op-challenger" }}
        cannon_prestate_path: ""
        cannon_prestates_url: "http://fileserver/proofs/op-program/cannon"
        extra_params: []
      proposer_params:
        image: {{ localDockerImage "op-proposer" }}
        extra_params: []
        game_type: 1
        proposal_interval: 5m  # More frequent proposals for Celo
      mev_params:
        rollup_boost_image: ""
        builder_host: ""
        builder_port: ""
      additional_services: []
  op_contract_deployer_params:
    image: {{ localDockerImage "op-deployer" }}
    l1_artifacts_locator: {{ localContractArtifacts "l1" }}
    l2_artifacts_locator: {{ localContractArtifacts "l2" }}
    global_deploy_overrides:
      faultGameAbsolutePrestate: {{ localPrestate.Hashes.prestate }}
  global_log_level: "info"
  global_node_selectors: {}
  global_tolerations: []
  persistent: false
ethereum_package:
  participants:
    - el_type: geth
      cl_type: teku
  network_params:
    preset: minimal
    genesis_delay: 5
    additional_preloaded_contracts: |
      {
        "0x4e59b44847b379578588920cA78FbF26c0B4956C": {
          "balance": "0ETH",
