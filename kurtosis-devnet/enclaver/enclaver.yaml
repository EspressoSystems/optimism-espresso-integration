# enclaver.yaml
version: v1
name: "op-batcher"
target: "enclave-batcher:latest"
# description: "Run op-batcher inside an enclave"
sources:
  app: "op-batcher:app"

defaults:
  memory_mb: 4096
  cpu_count: 2

# Networking policies
ingress:
  - listen_port: 33333

egress:
  allow:
    - host
    - 127.0.0.1
    - 0.0.0.0
    - 18.118.102.71 
    - 172.31.37.114
