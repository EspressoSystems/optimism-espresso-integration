# enclaver.yaml
version: v1
name: "op-batcher:app"
target: "enclave:latest"
# description: "Run op-batcher inside an enclave"
sources:
  app: "op-batcher:app"

defaults:
  memory_mb: 1024
  cpu_count: 2

# Networking policies
ingress:
  - listen_port: 32799

egress:
  allow:
    - host
#      - 127.0.0.1:32799 # L1 ETH RPC
#      - 127.0.0.1:32811 # L2 ETH RPC
#      - 127.0.0.1:32814 # Rollup RPC
#      - 127.0.0.1:32805 # Espresso URL
#      - 127.0.0.1:32806 # ALTDA DA Server