# Espresso OP Integration Docker Setup

services:
  l1:
    build:
      context: ./ops/docker/deployment-utils
    image: l1-geth:espresso
    ports:
      - "8545:8545" # L1 RPC
    networks:
      - opnet

  op-node-sequencer:
    build:
      context: .
      dockerfile: ./ops/docker/op-stack-go/Dockerfile
      target: op-node-target
    image: op-node-sequencer:espresso
    depends_on:
      - l1
    environment:
      L1_RPC: http://l1:8545
    volumes:
      - ./packages/contracts-bedrock/lib/superchain-registry/ops/testdata/monorepo:/config
      - ./op-program/chainconfig/test/configs:/configs
    command:
      - op-node
      - --l1=http://l1:8545
      - --l1.beacon ""
      - --l2=http://op-geth:8551
      - --l2.jwt-secret=/config/jwt.txt
      - --rollup.config=/configs/901-rollup.json
      - --sequencer.enabled=true
    networks:
      - opnet

  op-node-verifier:
    build:
      context: .
      dockerfile: ./ops/docker/op-stack-go/Dockerfile
      target: op-node-target
    image: op-node-verifier:espresso
    depends_on:
      - l1
    environment:
      L1_RPC: http://l1:8545
    volumes:
      - ./packages/contracts-bedrock/lib/superchain-registry/ops/testdata/monorepo:/config
      - ./op-program/chainconfig/test/configs:/configs
    command:
      - op-node
      - --l1=http://l1:8545
      - --l1.beacon ""
      - --l2=http://op-geth:8551
      - --l2.jwt-secret=/config/jwt.txt
      - --rollup.config=/configs/901-rollup.json
      - --verifier
    networks:
      - opnet

  op-batcher:
    build:
      context: .
      dockerfile: ./ops/docker/op-stack-go/Dockerfile
      target: op-batcher-target
    image: op-batcher:espresso
    depends_on:
      - op-node-sequencer
    environment:
      L1_RPC: http://l1:8545
    volumes:
      - ./packages/contracts-bedrock/lib/superchain-registry/ops/testdata/monorepo:/config
    command:
      - op-batcher
      - --l1-eth-rpc=http://l1:8545
      - --rollup-rpc=http://op-node-sequencer:8545
      - --espresso-url=http://espresso-dev-node:24000
      - --espresso-light-client-addr=0x703848f4c85f18e3acd8196c8ec91eb0b7bd0797

    networks:
      - opnet

  op-proposer:
    build:
      context: .
      dockerfile: ./ops/docker/op-stack-go/Dockerfile
      target: op-proposer-target
    image: op-proposer:espresso
    depends_on:
      - op-node-sequencer
    volumes:
      - ./packages/contracts-bedrock/lib/superchain-registry/ops/testdata/monorepo:/config
    command:
      - op-proposer
      - --l1-eth-rpc=http://l1:8545
      - --rollup-rpc=http://op-node-sequencer:8545
      - --l2=http://op-node-sequencer:8545
    networks:
      - opnet

  op-deployer:
    build:
      context: .
      dockerfile: ./op-deployer/Dockerfile.default
    image: op-deployer:espresso
    depends_on:
      - l1
    command: ["apply", "--network", "devnet"]
    volumes:
      - ./packages/contracts-bedrock/lib/superchain-registry/ops/testdata/monorepo:/config
    restart: "no"
    networks:
      - opnet

  espresso-dev-node:
    image: ghcr.io/espressosystems/espresso-sequencer/espresso-dev-node:release-goldendoodle
    ports:
      - "24000:24000" # Espresso sequencer
      - "24002:24002" # Espresso dev node
      - "31003:31003" # Espresso builder
    volumes:
      - espresso-data:/data
    networks:
      - opnet
    environment:
      RUST_LOG: info
      ESPRESSO_SEQUENCER_STORAGE_PATH: /data/espresso

  caff-node:
    image: ghcr.io/espressosystems/espresso-sequencer/espresso-dev-node:release-goldendoodle
    networks:
      - opnet
    environment:
      RUST_LOG: info

networks:
  opnet:

volumes:
  espresso-data:
