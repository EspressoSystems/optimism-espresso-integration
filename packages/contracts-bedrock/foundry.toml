################################################################
#                   PROFILE: DEFAULT (local)                   #
################################################################

[profile.default]

src = 'src'
out = 'forge-artifacts'
script = 'scripts'
build_info_path = 'artifacts/build-info'
snapshots = 'notarealpath'               # workaround for foundry#9477
allow_internal_expect_revert = true      # workaround described in https://github.com/PaulRBerg/prb-math/issues/248

use_literal_content = true

optimizer = true
optimizer_runs = 999999

# IMPORTANT:
# When adding any new compiler profiles or compilation restrictions, you must
# also update the restrictions in the "LITE" profile to match. This guarantees
# that builds will fully overwrite one another without needing to clean the
# entire build directory.
additional_compiler_profiles = [
  { name = "dispute", optimizer_runs = 5000 },
  { name = "via-ir", via_ir = true },
]
compilation_restrictions = [
  { paths = "src/dispute/FaultDisputeGame.sol", optimizer_runs = 5000 },
  { paths = "src/dispute/PermissionedDisputeGame.sol", optimizer_runs = 5000 },
  { paths = "src/dispute/SuperFaultDisputeGame.sol", optimizer_runs = 5000 },
  { paths = "src/dispute/SuperPermissionedDisputeGame.sol", optimizer_runs = 5000 },
  { paths = "src/L1/OPContractsManager.sol", optimizer_runs = 5000 },
  { paths = "src/L1/OPContractsManagerStandardValidator.sol", optimizer_runs = 5000 },
  { paths = "src/L1/opcm/OPContractsManagerV2.sol", optimizer_runs = 5000 },
  { paths = "src/L1/opcm/OPContractsManagerContainer.sol", optimizer_runs = 5000 },
  { paths = "src/L1/opcm/OPContractsManagerMigrator.sol", optimizer_runs = 5000 },
  { paths = "src/L1/opcm/OPContractsManagerUtils.sol", optimizer_runs = 5000 },
  { paths = "src/L1/opcm/OPContractsManagerUtilsCaller.sol", optimizer_runs = 5000 },
  { paths = "src/L1/OptimismPortal2.sol", optimizer_runs = 5000 },
  { paths = "src/L1/ProtocolVersions.sol", optimizer_runs = 5000 },
  { paths = "src/L1/StandardValidator.sol", optimizer_runs = 5000 },
  { paths = "src/universal/StorageSetter.sol", optimizer_runs = 5000 }
]

extra_output = ['devdoc', 'userdoc', 'metadata', 'storageLayout']
bytecode_hash = 'none'
ast = true
evm_version = 'cancun'

remappings = [
  # Espresso-tee-contracts context-specific remappings (must come before general @openzeppelin remappings)
  'lib/espresso-tee-contracts/:@openzeppelin/contracts/=lib/espresso-tee-contracts/lib/openzeppelin-contracts/contracts',
  'lib/espresso-tee-contracts/:@openzeppelin/contracts-upgradeable/=lib/espresso-tee-contracts/lib/openzeppelin-contracts-upgradeable/contracts',
  'lib/espresso-tee-contracts/:solady/=lib/solady/src',
  # General remappings
  '@openzeppelin/contracts-upgradeable/=lib/openzeppelin-contracts-upgradeable/contracts',
  '@espresso-tee-contracts/=lib/espresso-tee-contracts/src',
  '@nitro-validator/=lib/espresso-tee-contracts/lib/nitro-validator/src',
  'aws-nitro-enclave-attestation/=lib/espresso-tee-contracts/lib/aws-nitro-enclave-attestation/contracts/src',
  '@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts',
  '@openzeppelin/contracts-v5/=lib/openzeppelin-contracts-v5/contracts',
  '@rari-capital/solmate/=lib/solmate',
  '@lib-keccak/=lib/lib-keccak/contracts/lib',
  'solady/=lib/solady/',
  '@solady/=lib/solady/src',
  '@solady-v0.0.245/=lib/solady-v0.0.245/src',
  'forge-std/=lib/forge-std/src',
  'ds-test/=lib/forge-std/lib/ds-test/src',
  'safe-contracts/=lib/safe-contracts/contracts',
  'kontrol-cheatcodes/=lib/kontrol-cheatcodes/src',
  'interfaces/=interfaces',
]

fs_permissions = [
  { access='read-write', path='./.resource-metering.csv' },
  { access='read-write', path='./snapshots/' },
  { access='read-write', path='./deployments/' },
  { access='read', path='./deploy-config/' },
  { access='read', path='./deploy-config-periphery/' },
  { access='read', path='./broadcast/' },
  { access='read', path = './forge-artifacts/' },
  { access='read-write', path='./.testdata/' },
  { access='read', path='./kout-deployment' },
  { access='read', path='./test/fixtures' },
  { access='read', path='./lib/superchain-registry/superchain/configs/' },
  { access='read', path='./lib/superchain-registry/validation/standard/' },
  { access = 'read-write', path = '../../op-chain-ops/cmd/celo-migrate/testdata/' },
]

# 5159 = selfdestruct; 6321 = unnamed return variable; 5667 = unused param (lib/espresso-tee-contracts mocks)
ignored_error_codes = ["transient-storage", "code-size", "init-code-size", "too-many-warnings", 5159, 6321, 5667]
deny_warnings = true
ffi = true

# We set the gas limit to max int64 to avoid running out of gas during testing, since the default
# gas limit is 1B and some of our tests require more gas than that, such as
# test_callWithMinGas_noLeakageLow_succeeds. We use this gas limit since it was the default gas
# limit prior to https://github.com/foundry-rs/foundry/pull/8274. Due to toml-rs limitations, if
# you increase the gas limit above this value it must be a string.
gas_limit = 9223372036854775807

[fuzz]
runs = 64
failure_persist_file = "~/Desktop/failures.txt"

[fmt]
line_length=120
multiline_func_header='all'
bracket_spacing=true
wrap_comments=true

################################################################
#                         PROFILE: CI                          #
################################################################

[profile.ci.fuzz]
runs = 128

[profile.ci.invariant]
runs = 64
depth = 32

################################################################
#                     PROFILE: CICOVERAGE                      #
################################################################

[profile.cicoverage]
optimizer = false
compilation_restrictions = []

[profile.cicoverage.fuzz]
runs = 1

[profile.cicoverage.invariant]
runs = 1
depth = 1

################################################################
#                       PROFILE: CIHEAVY                       #
################################################################

[profile.ciheavy]
optimizer = false
optimizer_runs = 200
use_literal_content = false

# IMPORTANT:
# See the info in the "DEFAULT" profile to understand this section.
additional_compiler_profiles = [
  { name = "dispute", optimizer_runs = 0 },
  { name = "via-ir", via_ir = true },
]
compilation_restrictions = [
  { paths = "src/dispute/FaultDisputeGame.sol", optimizer_runs = 0 },
  { paths = "src/dispute/PermissionedDisputeGame.sol", optimizer_runs = 0 },
  { paths = "src/dispute/SuperFaultDisputeGame.sol", optimizer_runs = 0 },
  { paths = "src/dispute/SuperPermissionedDisputeGame.sol", optimizer_runs = 0 },
  { paths = "src/L1/OPContractsManager.sol", optimizer_runs = 0 },
  { paths = "src/L1/OPContractsManagerStandardValidator.sol", optimizer_runs = 0 },
  { paths = "src/L1/opcm/OPContractsManagerV2.sol", optimizer_runs = 0 },
  { paths = "src/L1/opcm/OPContractsManagerContainer.sol", optimizer_runs = 0 },
  { paths = "src/L1/opcm/OPContractsManagerMigrator.sol", optimizer_runs = 0 },
  { paths = "src/L1/opcm/OPContractsManagerUtils.sol", optimizer_runs = 0 },
  { paths = "src/L1/opcm/OPContractsManagerUtilsCaller.sol", optimizer_runs = 0 },
  { paths = "src/L1/OptimismPortal2.sol", optimizer_runs = 0 },
  { paths = "src/L1/ProtocolVersions.sol", optimizer_runs = 0 },
  { paths = "src/universal/StorageSetter.sol", optimizer_runs = 0 },
  { paths = "src/L1/StandardValidator.sol", optimizer_runs = 5000 },
]

[profile.ciheavy.fuzz]
runs = 20000
timeout = 300

[profile.ciheavy.invariant]
runs = 128
depth = 512
timeout = 300

################################################################
#                       PROFILE: LITECI                        #
################################################################
# Unoptimized build (fast compile) with CI-level fuzz/invariant
# settings. Used for PR test runs where build speed matters but
# test thoroughness should match CI.

[profile.liteci]
optimizer = false
optimizer_runs = 0

# IMPORTANT:
# See the info in the "DEFAULT" profile to understand this section.
additional_compiler_profiles = [
  { name = "dispute", optimizer_runs = 0 },
]
compilation_restrictions = [
  { paths = "src/dispute/FaultDisputeGame.sol", optimizer_runs = 0 },
  { paths = "src/dispute/PermissionedDisputeGame.sol", optimizer_runs = 0 },
  { paths = "src/dispute/SuperFaultDisputeGame.sol", optimizer_runs = 0 },
